services:
  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: local
      AWS_REGION: ${AWS_REGION:-eu-west-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      SECRETS_STAGE: ${SECRETS_STAGE:-dev}
      APP_SECRET_NAME: ${APP_SECRET_NAME:-/dstrmaysam-healthcare-knowledge-agent/dev/app}
      AZURE_OPENAI_SECRET_NAME: ${AZURE_OPENAI_SECRET_NAME:-/dstrmaysam-healthcare-knowledge-agent/dev/azure-openai}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2025-04-01-preview}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-gpt-4.1-mini}
      AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${AZURE_OPENAI_EMBEDDING_DEPLOYMENT:-text-embedding-3-small}
      LANGFUSE_SECRET_NAME: ${LANGFUSE_SECRET_NAME:-/dstrmaysam-healthcare-knowledge-agent/dev/langfuse}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-}
      S3_BUCKET: ${S3_BUCKET:-dstrmaysam-healthcare-knowledge-agent-dev}
      S3_RAW_PREFIX: ${S3_RAW_PREFIX:-raw/}
      S3_MANIFEST_KEY: ${S3_MANIFEST_KEY:-manifests/documents.json}
      OPENSEARCH_ENDPOINT: ${OPENSEARCH_ENDPOINT:-}
      OPENSEARCH_INDEX: ${OPENSEARCH_INDEX:-dstrmaysam-healthcare-knowledge-agent-dev}
      DYNAMODB_CHAT_TABLE: ${DYNAMODB_CHAT_TABLE:-dstrmaysam-healthcare-knowledge-agent-dev}
      CHAT_HISTORY_BACKEND: ${CHAT_HISTORY_BACKEND:-memory}
      DOCUMENT_MANIFEST_CACHE_TTL_SECONDS: ${DOCUMENT_MANIFEST_CACHE_TTL_SECONDS:-300}
      LANGFUSE_PROMPT_CACHE_TTL_SECONDS: ${LANGFUSE_PROMPT_CACHE_TTL_SECONDS:-300}
      CHAT_FAST_RAG_ENABLED: ${CHAT_FAST_RAG_ENABLED:-true}
      CHAT_FAST_RAG_MIN_QUERY_TERMS: ${CHAT_FAST_RAG_MIN_QUERY_TERMS:-3}
      MAX_GRAPH_LLM_CALLS: ${MAX_GRAPH_LLM_CALLS:-2}
      RAG_TOP_K: ${RAG_TOP_K:-10}
      RAG_NEIGHBOR_CHUNKS: ${RAG_NEIGHBOR_CHUNKS:-1}
      INGESTION_CHUNK_SIZE: ${INGESTION_CHUNK_SIZE:-1500}
      INGESTION_CHUNK_OVERLAP: ${INGESTION_CHUNK_OVERLAP:-250}
      EXACT_FACT_ANSWERS_ENABLED: ${EXACT_FACT_ANSWERS_ENABLED:-true}
      RAG_EXACT_KEYWORD_ONLY: ${RAG_EXACT_KEYWORD_ONLY:-true}
      RAG_PARALLEL_SEARCH_ENABLED: ${RAG_PARALLEL_SEARCH_ENABLED:-true}
      CHAT_BACKGROUND_HISTORY_SAVE_ENABLED: ${CHAT_BACKGROUND_HISTORY_SAVE_ENABLED:-true}
      LOCAL_DATA_DIR: ${LOCAL_DATA_DIR:-/app/data}
      CHROMA_PERSIST_DIR: ${CHROMA_PERSIST_DIR:-/app/data/chroma}
      CHROMA_COLLECTION: ${CHROMA_COLLECTION:-dstrmaysam-healthcare-knowledge-agent}
      LOCAL_APP_SECRET_FILE: ${LOCAL_APP_SECRET_FILE:-/app/data/local_app_secret.json}
      LOCAL_TEST_ADMIN_ENABLED: ${LOCAL_TEST_ADMIN_ENABLED:-true}
      LOCAL_TEST_ADMIN_USERNAME: ${LOCAL_TEST_ADMIN_USERNAME:-admin}
      LOCAL_TEST_ADMIN_PASSWORD: ${LOCAL_TEST_ADMIN_PASSWORD:-admin123}
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
    ports:
      - "8501:8501"
    depends_on:
      - backend
